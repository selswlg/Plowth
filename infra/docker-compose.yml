version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: plowth_postgres
    environment:
      POSTGRES_USER: real_user
      POSTGRES_PASSWORD: real_dev_password
      POSTGRES_DB: real_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U real_user -d real_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: plowth_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
